{% extends "base.html" %}
{% block content %}
<a class="back-link" href="news/">&larr; Back to news</a>
<section class="page-hero" style="padding-top:24px;">
  <span class="eyebrow">{{ post.date_display }}</span>
  <h1>{{ post.title }}</h1>
</section>

<div class="post-hero-img" style="margin-top:36px;">
  <img src="{{ post.cover }}" alt="{{ post.title }}" width="1280" height="720">
</div>

<article class="post-content">
  {{ post.html | safe }}
</article>
{% endblock %}
